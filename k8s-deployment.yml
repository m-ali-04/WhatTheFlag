apiVersion: apps/v1
kind: Deployment
metadata:
  name: what-the-flag
spec:
  replicas: 2 # This runs two copies for reliability
  selector:
    matchLabels:
      app: wtf-game
  template:
    metadata:
      labels:
        app: wtf-game
    spec:
      containers:
      - name: game-container
        image: aliwhaa/whattheflag:latest # Update this if your image name is different!
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: wtf-service
spec:
  type: NodePort
  selector:
    app: wtf-game
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001 # This makes the game available at http://98.92.201.87:30001
