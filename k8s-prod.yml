# --- 1. STORAGE ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
# --- 2. DATABASE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 27017
---
# --- 3. BOT SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service
spec:
  selector:
    matchLabels:
      app: bot-service
  template:
    metadata:
      labels:
        app: bot-service
    spec:
      containers:
      - name: bot
        image: aliwhaa/wtf-bot:1b84f79
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: bot-service
spec:
  selector:
    app: bot-service
  ports:
    - port: 5002
---
# --- 4. GAME ENGINE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-engine
spec:
  selector:
    matchLabels:
      app: game-engine
  template:
    metadata:
      labels:
        app: game-engine
    spec:
      containers:
      - name: engine
        image: aliwhaa/wtf-engine:1b84f79
        env:
        - name: MONGO_URI
          value: "mongodb://db:27017/"
        - name: BOT_SERVICE_URL
          value: "http://bot-service:5002"
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: game-engine
spec:
  selector:
    app: game-engine
  ports:
    - port: 5001
---
# --- 5. FRONTEND ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: aliwhaa/wtf-frontend:1b84f79
        env:
        - name: ENGINE_URL
          value: "http://game-engine:5001/api"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001
