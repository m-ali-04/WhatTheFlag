name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s-prod.yml' # Prevent infinite loops when the bot commits
      - 'README.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-frontend:${{ steps.vars.outputs.sha_short }},${{ secrets.DOCKERHUB_USERNAME }}/wtf-frontend:latest

      - name: Build and push Game Engine
        uses: docker/build-push-action@v4
        with:
          context: ./game-engine
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-engine:${{ steps.vars.outputs.sha_short }},${{ secrets.DOCKERHUB_USERNAME }}/wtf-engine:latest

      - name: Build and push Bot Service
        uses: docker/build-push-action@v4
        with:
          context: ./bot-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-bot:${{ steps.vars.outputs.sha_short }},${{ secrets.DOCKERHUB_USERNAME }}/wtf-bot:latest

      - name: Update Kubernetes manifests
        run: |
          # Replace the existing tags with the new commit SHA tag
          # This assumes the image names in k8s-prod.yml are formatted like: image: aliwhaa/wtf-frontend:latest
          
          sed -i 's|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-frontend:${{ steps.vars.outputs.sha_short }}|g' k8s-prod.yml
          sed -i 's|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-engine:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-engine:${{ steps.vars.outputs.sha_short }}|g' k8s-prod.yml
          sed -i 's|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-bot:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wtf-bot:${{ steps.vars.outputs.sha_short }}|g' k8s-prod.yml

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add k8s-prod.yml
          git commit -m "chore: update image tags to ${{ steps.vars.outputs.sha_short }} [skip ci]" || echo "No changes to commit"
          git push
